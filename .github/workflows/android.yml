name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Inject Build Timestamp
        run: sed -i "s/__BUILD_DATE__/$(date -u +%Y-%m-%dT%H:%M:%SZ)/g" dist/index.html

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore -Pandroid.injected.signing.store.password=password -Pandroid.injected.signing.key.alias=release -Pandroid.injected.signing.key.password=password

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 28E-Voice-App.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create or Update Latest Release
        uses: ncipollo/release-action@v1
        with:
          tag: "latest"
          name: "Latest Build"
          body: "Auto-generated APK for OTA updates."
          artifacts: "android/app/build/outputs/apk/release/app-release.apk"
          allowUpdates: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
