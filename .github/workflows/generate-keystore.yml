name: Generate Keystore
on: [push]
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Keystore
        run: |
          if [ ! -f "android/app/release.keystore" ]; then
            keytool -genkey -v -keystore android/app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=28EVoice, OU=App, O=28E, L=City, S=State, C=US"
            keytool -list -v -keystore android/app/release.keystore -alias release -storepass password -keypass password | grep SHA1 > android/app/SHA1.txt
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add android/app/release.keystore android/app/SHA1.txt
            git commit -m "chore: generate release keystore and SHA1"
            git push origin master
          fi
