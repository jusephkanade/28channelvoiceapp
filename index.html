<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>28E Voice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Prevent text selection and pull-to-refresh on mobile */
    body {
      margin: 0;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Mobile specific adjustments */
    #app-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* We will use the same ID structure to make porting voice-channel-widget.js easier */
    #vc-widget {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .vc-glass {
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    
    /* Completely hide the floating action button and the bottom bar */
    #vc-fab, #vc-bar { 
      display: none !important; 
    }
    
    /* Force the panel to be full screen, always visible, without rounded corners */
    #vc-panel {
      opacity: 1 !important;
      transform: scale(1) translateY(0) !important;
      pointer-events: auto !important;
      border-radius: 0 !important;
      border: none !important;
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      background-color: #09090b !important;
    }
    
    /* Hide the X close button as this is a full-screen app */
    #vc-close {
      display: none !important;
    }
    
    /* Hide scrollbars but allow scrolling */
    ::-webkit-scrollbar { 
      width: 0px; 
      background: transparent; 
    }
  </style>
</head>
<body class="bg-black text-white antialiased">
  <div id="app-container">
    <div id="vc-root" class="w-full h-full">
      <!-- The voice channel widget UI will be injected here by main.js -->
    </div>
    <!-- Initial Loader -->
    <div id="initial-loader" class="fixed inset-0 z-[100000] bg-[#09090b] flex flex-col items-center justify-center transition-opacity duration-500">
      <div class="relative w-16 h-16 mb-4">
        <div class="absolute inset-0 rounded-full border-[3px] border-amber-500/20"></div>
        <div class="absolute inset-0 rounded-full border-[3px] border-amber-500 border-t-transparent animate-spin"></div>
        <div class="absolute inset-0 flex items-center justify-center text-amber-500">
          <svg class="w-6 h-6 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
        </div>
      </div>
      <div class="text-amber-500/80 text-xs font-bold tracking-widest uppercase animate-pulse">Iniciando...</div>
    </div>
  </div>
  
  <!-- We include socket.io client -->
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <!-- We include GSAP for smooth animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  
  <script src="/voice-channel-widget.js"></script>
  <script type="module" src="/main.js"></script>
</body>
</html>
