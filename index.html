<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>28E Voice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Aumentar escala base global para móviles (Tailwind rem scaling) */
    html {
      font-size: 17px; /* Base por defecto es 16px. 17px = ~6% más grande */
    }

    /* Prevent text selection and pull-to-refresh on mobile */
    body {
      margin: 0;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Mobile specific adjustments */
    #app-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* We will use the same ID structure to make porting voice-channel-widget.js easier */
    #vc-widget {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .vc-glass {
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    
    /* Completely hide the floating action button and the bottom bar */
    #vc-fab, #vc-bar { 
      display: none !important; 
    }
    
    /* Force the panel to be full screen, always visible, without rounded corners */
    #vc-panel {
      opacity: 1 !important;
      transform: scale(1) translateY(0) !important;
      pointer-events: auto !important;
      border-radius: 0 !important;
      border: none !important;
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      background-color: #09090b !important;
    }
    
    /* Hide the X close button as this is a full-screen app */
    #vc-close {
      display: none !important;
    }
    
    /* Hide scrollbars but allow scrolling */
    ::-webkit-scrollbar { 
      width: 0px; 
      background: transparent; 
    }
  </style>
</head>
<body class="bg-black text-white antialiased">
  <div id="app-container">
    <div id="vc-root" class="w-full h-full">
      <!-- The voice channel widget UI will be injected here by main.js -->
    </div>
    <!-- ═══ LOADER ORIGINAL DE 28E MAIN ═══ -->
    <div id="initial-loader"
        style="position:fixed;inset:0;z-index:200000;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;will-change:transform,opacity;">

        <!-- Ambient glow -->
        <div class="loader-glow loader-glow-1"></div>
        <div class="loader-glow loader-glow-2"></div>

        <!-- Logo -->
        <div id="loader-logo"
            style="position:relative;z-index:10;opacity:0;margin-bottom:2rem;text-align:center;animation:ldFadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.15s forwards;">
            <span
                style="font-family:sans-serif;font-weight:900;font-size:2.6rem;letter-spacing:-0.06em;color:#fff;line-height:1;">28E</span>
        </div>

        <!-- Sphere + Progress Ring -->
        <div id="custom-loader-wrapper"
            style="position:relative;z-index:10;display:flex;align-items:center;justify-content:center;width:220px;height:220px;opacity:0;animation:ldScaleIn 0.8s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;">

            <!-- SVG Progress Ring -->
            <svg width="220" height="220" viewBox="0 0 220 220" style="position:absolute;inset:0;z-index:2;">
                <circle cx="110" cy="110" r="104" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
                <circle id="loader-ring-fill" cx="110" cy="110" r="104" fill="none" stroke="url(#ld-ring-grad)"
                    stroke-width="1.5" stroke-linecap="round" stroke-dasharray="653.45" stroke-dashoffset="653.45"
                    transform="rotate(-90 110 110)"
                    style="transition:stroke-dashoffset 0.5s cubic-bezier(0.4,0,0.2,1);" />
                <defs>
                    <linearGradient id="ld-ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.7" />
                        <stop offset="100%" stop-color="#ec4899" stop-opacity="0.7" />
                    </linearGradient>
                </defs>
            </svg>

            <!-- The Sphere -->
            <div style="position:relative;width:180px;height:180px;border-radius:50%;user-select:none;">
                <div class="loader-circle-bg"></div>
            </div>

            <!-- Sphere shadow (ground reflection) -->
            <div
                style="position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:100px;height:14px;background:radial-gradient(ellipse,rgba(236,72,153,0.12) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0;">
            </div>
        </div>

        <!-- Footer -->
        <div id="loader-footer"
            style="position:absolute;bottom:2rem;left:0;right:0;z-index:15;text-align:center;opacity:0;animation:ldFadeIn 0.4s ease 0.7s forwards;color:rgba(255,255,255,0.3);font-family:sans-serif;font-size:0.65rem;letter-spacing:0.05em;font-weight:300;pointer-events:none;">
            Conectando universo... ✨
        </div>

        <style>
            .loader-glow { position: absolute; border-radius: 50%; filter: blur(60px); pointer-events: none; opacity: 0.6; }
            .loader-glow-1 { top: -20%; left: -20%; width: 60%; height: 60%; background: radial-gradient(circle, #f59e0b, transparent 70%); animation: ldPulse 6s infinite alternate ease-in-out; }
            .loader-glow-2 { bottom: -20%; right: -20%; width: 60%; height: 60%; background: radial-gradient(circle, #ec4899, transparent 70%); animation: ldPulse 8s infinite alternate-reverse ease-in-out; }
            
            @keyframes ldPulse { 0% { transform: scale(0.8); opacity: 0.4; } 100% { transform: scale(1.2); opacity: 0.8; } }

            .loader-circle-bg {
                position: absolute;
                inset: 0;
                border-radius: 50%;
                background-color: transparent;
                animation: loader-rotate 2.5s linear infinite;
            }

            @keyframes loader-rotate {
                0% {
                    transform: rotate(90deg);
                    box-shadow:
                        0 10px 20px 0 #fff inset,
                        0 20px 30px 0 #f59e0b inset,
                        0 60px 60px 0 #ec4899 inset;
                }
                50% {
                    transform: rotate(270deg);
                    box-shadow:
                        0 10px 20px 0 #fff inset,
                        0 20px 10px 0 #ec4899 inset,
                        0 40px 60px 0 #d97706 inset;
                }
                100% {
                    transform: rotate(450deg);
                    box-shadow:
                        0 10px 20px 0 #fff inset,
                        0 20px 30px 0 #f59e0b inset,
                        0 60px 60px 0 #ec4899 inset;
                }
            }
            
            @keyframes ldFadeUp {
                from { opacity: 0; transform: translateY(15px); }
                to { opacity: 1; transform: translateY(0); }
            }
            @keyframes ldScaleIn {
                from { opacity: 0; transform: scale(0.9); }
                to { opacity: 1; transform: scale(1); }
            }
            @keyframes ldFadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
        </style>
    </div>
  </div>
  
  <!-- We include socket.io client -->
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <!-- We include GSAP for smooth animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  
  <script>
    // This value is injected by GitHub Actions during the build process
    window.APP_BUILD_DATE = "__BUILD_DATE__";
  </script>

  <script src="/voice-channel-widget.js"></script>
  <script type="module" src="/main.js"></script>
</body>
</html>
